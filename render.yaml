services:
  - type: web
    name: quant-trading-app
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      cd ../frontend && npm install && npm run build-only
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.19.0
      - key: SQLITE_DB_PATH
        value: /tmp/quant_trading.db
      - key: BACKEND_CORS_ORIGINS
        value: '["*"]'
    healthCheckPath: /health